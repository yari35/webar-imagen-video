<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>WebAR</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>

<body style="margin:0; overflow:hidden; background:black;">
  <div id="ui" style="
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    background:rgba(0,0,0,.7);
    z-index:10;
    color:#fff;
    font-family:system-ui;
  ">
    <button id="startBtn" style="font-size:18px; padding:14px 18px; margin-bottom:10px;">
      Iniciar AR
    </button>

    <button id="audioBtn" style="font-size:16px; padding:10px 14px; display:none;">
      Activar audio
    </button>
  </div>

  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: false;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    renderer="alpha: true; antialias: true; colorManagement: true;">

    <a-assets>
      <video
        id="rgb"
        src="./overlay.mp4"
        loop
        muted
        playsinline
        webkit-playsinline
        preload="auto"
      ></video>

      <canvas id="canvas" width="720" height="1280"></canvas>
    </a-assets>

    <a-camera position="0 0 0"></a-camera>

    <a-entity id="target0" mindar-image-target="targetIndex: 0">
      <a-plane
        position="0 0 0.01"
        width="1.2537"
        height="1"
        material="src:#canvas; shader: flat; side: double;">
      </a-plane>
    </a-entity>

  </a-scene>

  <script>
    const startBtn = document.getElementById("startBtn");
    const audioBtn = document.getElementById("audioBtn");
    const ui = document.getElementById("ui");
    const scene = document.querySelector("a-scene");

    const rgb = document.getElementById("rgb");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    function render() {
      if (rgb.readyState >= 2) {
        ctx.drawImage(rgb, 0, 0, canvas.width, canvas.height);
      }
      requestAnimationFrame(render);
    }

    startBtn.addEventListener("click", async () => {
      try {
        await scene.systems["mindar-image-system"].start();

        rgb.muted = true;
        await rgb.play();

        audioBtn.style.display = "block";
      } catch (e) {
        alert("Error al iniciar cámara");
      }
    });

    audioBtn.addEventListener("click", async () => {
      try {
        rgb.muted = false;
        rgb.volume = 1.0;
        await rgb.play();
        ui.style.display = "none";
      } catch (e) {
        alert("iPhone bloqueó el audio");
      }
    });

    render();
  </script>
</body>
</html>
