<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>WebAR</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>

<body style="margin:0; overflow:hidden; background:black;">
  <div id="ui" style="
    position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    flex-direction:column;
    background:rgba(0,0,0,.7); z-index:10; color:#fff; font-family:system-ui;
  ">
    <button id="startBtn" style="font-size:18px; padding:14px 18px;">
      Iniciar AR
    </button>

    <button id="audioBtn" style="font-size:16px; padding:10px 14px; margin-top:10px; display:none;">
      Activar audio
    </button>
  </div>

  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: false;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    renderer="alpha: true; antialias: true; colorManagement: true;">

    <a-assets>
      <!-- Video color -->
      <video
        id="rgb"
        src="./overlay.mp4"
        loop
        muted
        playsinline
        webkit-playsinline
        preload="auto"
        crossorigin="anonymous"
      ></video>

      <!-- Video alpha / matte -->
      <video
        id="alpha"
        src="./senora_alpha.mp4"
        loop
        muted
        playsinline
        webkit-playsinline
        preload="auto"
        crossorigin="anonymous"
      ></video>

      <!-- Canvas donde combinamos ambos -->
      <canvas id="compositeCanvas" width="720" height="1280"></canvas>
    </a-assets>

    <a-camera position="0 0 0"></a-camera>

    <a-entity id="target0" mindar-image-target="targetIndex: 0" smooth="true" smoothCount="10">
      <a-plane
        id="videoPlane"
        position="0 0 0.01"
        width="1.2537"
        height="1"
        material="src:#compositeCanvas; shader: flat; side: double; transparent: true;">
      </a-plane>
    </a-entity>
  </a-scene>

  <script>
    const startBtn = document.getElementById("startBtn");
    const audioBtn = document.getElementById("audioBtn");
    const ui = document.getElementById("ui");
    const scene = document.querySelector("a-scene");
    const target = document.getElementById("target0");

    const rgb = document.getElementById("rgb");
    const alpha = document.getElementById("alpha");
    const canvas = document.getElementById("compositeCanvas");
    const ctx = canvas.getContext("2d", { willReadFrequently: true });

    let trackingStarted = false;
    let targetVisible = false;

    function compositeVideos() {
      const w = canvas.width;
      const h = canvas.height;

      if (rgb.readyState >= 2 && alpha.readyState >= 2) {
        ctx.clearRect(0, 0, w, h);

        // 1. Dibujar RGB
        ctx.drawImage(rgb, 0, 0, w, h);
        const rgbFrame = ctx.getImageData(0, 0, w, h);

        // 2. Dibujar ALPHA
        ctx.clearRect(0, 0, w, h);
        ctx.drawImage(alpha, 0, 0, w, h);
        const alphaFrame = ctx.getImageData(0, 0, w, h);

        // 3. Mezclar: usar canal rojo del alpha como transparencia
        const rgbData = rgbFrame.data;
        const alphaData = alphaFrame.data;

        for (let i = 0; i < rgbData.length; i += 4) {
          rgbData[i + 3] = alphaData[i];
        }

        // 4. Escribir frame final
        ctx.clearRect(0, 0, w, h);
        ctx.putImageData(rgbFrame, 0, 0);
      }

      requestAnimationFrame(compositeVideos);
    }

    async function warmupVideos() {
      try {
        rgb.muted = true;
        alpha.muted = true;

        await rgb.play();
        await alpha.play();

        rgb.pause();
        alpha.pause();

        rgb.currentTime = 0;
        alpha.currentTime = 0;
      } catch (e) {
        console.log("Warmup blocked:", e);
      }
    }

    async function playBothMuted() {
      try {
        rgb.muted = true;
        alpha.muted = true;
        await rgb.play();
        await alpha.play();
      } catch (e) {
        console.log("Play muted failed:", e);
      }
    }

    function pauseBoth() {
      rgb.pause();
      alpha.pause();
      rgb.currentTime = 0;
      alpha.currentTime = 0;
    }

    startBtn.addEventListener("click", async () => {
      if (!trackingStarted) {
        try {
          await scene.systems["mindar-image-system"].start();
          trackingStarted = true;
        } catch (e) {
          console.log("MindAR start error:", e);
          alert("No se pudo iniciar cámara. Revisa permisos.");
          return;
        }
      }

      await warmupVideos();
      audioBtn.style.display = "block";
    });

    audioBtn.addEventListener("click", async () => {
      try {
        // Solo RGB lleva audio
        rgb.muted = false;
        rgb.volume = 1.0;
        alpha.muted = true;

        if (targetVisible) {
          await rgb.play();
          await alpha.play();
        }

        ui.style.display = "none";
      } catch (e) {
        console.log("Audio play blocked:", e);
        alert("iPhone bloqueó audio. Sube volumen / quita silencio y vuelve a tocar.");
      }
    });

    target.addEventListener("targetFound", async () => {
      targetVisible = true;
      await playBothMuted();
    });

    target.addEventListener("targetLost", () => {
      targetVisible = false;
      pauseBoth();
    });

    compositeVideos();
  </script>
</body>
</html>
